<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgu_EbB69kzEOFcCHDgvQZObh43Q6Q6kpt_aUOoHI_L5y9I8elULeWuKl89zDQKuJFTcY3M_SHWYevzonb06bnNBDIEYWbAZSS3mBNsUTwMxRW2HCpM7fryALmjZLSlJpFk9sQ1POTpYRBd3IE_T3Pd5QjwAhzSv-SZz1a_JK5IwZLpoPhHMa_vw6r939JY/s320/Untitled_design__2_-removebg-preview%20(1).png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arsip Digital</title>
    
    <!-- Preconnect to Google Fonts (early DNS lookup) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Load Inter font with font-display=block to prevent FOUT -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=block" rel="stylesheet" />
    
    <!-- Load Material Symbols with font-display=block -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet" />
    
    <!-- Inline critical CSS to prevent flash -->
    <style>
      /* Hide body until fonts loaded */
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        visibility: visible;
        opacity: 1;
        transition: opacity 0.2s ease-in;
      }
      
      /* Prevent icon flash - with responsive sizing */
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined';
        font-weight: normal;
        font-style: normal;
        font-size: 24px; /* Default size for desktop */
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        -moz-osx-font-smoothing: grayscale;
        font-feature-settings: 'liga';
      }
      
      /* Make icons larger on mobile for better touch targets */
      @media (max-width: 768px) {
        .material-symbols-outlined {
          font-size: 28px; /* Larger on mobile */
        }
        
        /* Override small icon sizes on mobile */
        .material-symbols-outlined[class*="text-[12px]"],
        .material-symbols-outlined[class*="text-[14px]"],
        .material-symbols-outlined[class*="text-[16px]"],
        .material-symbols-outlined.text-sm,
        .material-symbols-outlined.text-xs {
          font-size: 20px !important; /* Minimum size on mobile */
        }
      }
      
      /* Ensure Tailwind text size classes work properly */
      .material-symbols-outlined.text-xl {
        font-size: 1.25rem !important; /* 20px */
      }
      
      .material-symbols-outlined.text-2xl {
        font-size: 1.5rem !important; /* 24px */
      }
      
      .material-symbols-outlined.text-3xl {
        font-size: 1.875rem !important; /* 30px */
      }
      
      .material-symbols-outlined.text-4xl {
        font-size: 2.25rem !important; /* 36px */
      }
      }
      
      /* Loading screen */
      #app-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #fafafa;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease-out;
      }
      
      #app-loader.loaded {
        opacity: 0;
        pointer-events: none;
      }
      
      .loader-spinner {
        width: 50px;
        height: 50px;
        border: 4px solid #e0e0e0;
        border-top: 4px solid #6750a4;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      .loader-text {
        margin-top: 16px;
        color: #6750a4;
        font-size: 14px;
        font-weight: 500;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      /* Hide app content until fonts loaded */
      #root {
        opacity: 0;
        transition: opacity 0.3s ease-in;
      }
      
      #root.fonts-loaded {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="app-loader">
      <div class="loader-spinner"></div>
      <div class="loader-text">Memuat Arsip Digital...</div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Remove loader after fonts loaded -->
    <script>
      // Wait for both fonts to be ready
      Promise.all([
        document.fonts.load('400 1em Inter'),
        document.fonts.load('400 24px "Material Symbols Outlined"')
      ]).then(function() {
        // Fonts are loaded, wait a bit for rendering
        setTimeout(function() {
          const loader = document.getElementById('app-loader');
          const root = document.getElementById('root');
          
          if (root) {
            root.classList.add('fonts-loaded');
          }
          
          if (loader) {
            loader.classList.add('loaded');
            setTimeout(function() {
              loader.remove();
            }, 300);
          }
        }, 200);
      }).catch(function(err) {
        console.warn('Font loading failed:', err);
        // Fallback: show app anyway
        const loader = document.getElementById('app-loader');
        const root = document.getElementById('root');
        
        if (root) {
          root.classList.add('fonts-loaded');
        }
        
        if (loader) {
          loader.classList.add('loaded');
          setTimeout(function() {
            loader.remove();
          }, 300);
        }
      });
      
      // Fallback: Remove loader after 3 seconds even if fonts not loaded
      setTimeout(function() {
        const loader = document.getElementById('app-loader');
        const root = document.getElementById('root');
        
        if (loader && !loader.classList.contains('loaded')) {
          if (root) {
            root.classList.add('fonts-loaded');
          }
          
          loader.classList.add('loaded');
          setTimeout(function() {
            loader.remove();
          }, 300);
        }
      }, 3000);
    </script>
  </body>
</html>
